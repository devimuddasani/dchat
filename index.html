<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dchat 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Comfortaa:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #f472b6; --pink-light: #fce7f3; --pink-dark: #be185d;
    --mint: #34d399; --mint-light: #d1fae5; --mint-dark: #059669;
    --peach: #fb923c; --lavender: #a78bfa;
    --warm: #fffaf9; --text: #1c1917; --muted: #9ca3af;
    --border: #f3e8ff; --shadow: 0 4px 24px rgba(244,114,182,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Quicksand', sans-serif; background: var(--warm);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background-image:
      radial-gradient(ellipse at 10% 10%, #fce7f3 0%, transparent 45%),
      radial-gradient(ellipse at 90% 90%, #d1fae5 0%, transparent 45%),
      radial-gradient(ellipse at 50% 50%, #ede9fe 0%, transparent 60%);
  }
  .screen { display: none; width: 100%; }
  .screen.active { display: flex; }

  .logo-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 8px; }
  .logo-icon {
    width: 80px; height: 80px; margin-bottom: 10px;
    background: linear-gradient(135deg, #f472b6, #a78bfa, #34d399);
    border-radius: 24px; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px rgba(244,114,182,0.35);
    animation: floaty 3s ease-in-out infinite;
  }
  @keyframes floaty { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
  .logo-icon svg { width: 46px; height: 46px; }
  .logo-text { font-family:'Comfortaa',cursive; font-size:2.8rem; font-weight:700; background:linear-gradient(135deg,#f472b6,#a78bfa,#34d399); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:-1px; }
  .logo-text-sm { font-family:'Comfortaa',cursive; font-size:1.4rem; font-weight:700; background:linear-gradient(135deg,#f472b6,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .logo-icon-sm { width:36px; height:36px; background:linear-gradient(135deg,#f472b6,#a78bfa,#34d399); border-radius:10px; display:flex; align-items:center; justify-content:center; box-shadow:0 3px 10px rgba(244,114,182,0.3); }
  .logo-icon-sm svg { width:20px; height:20px; }
  .tagline { color:var(--muted); font-size:0.95rem; margin-bottom:32px; font-weight:600; }

  .card { background:white; border-radius:28px; padding:32px; width:100%; max-width:400px; box-shadow:var(--shadow); border:2px solid #fce7f3; }
  .card h2 { font-size:1.1rem; font-weight:700; color:var(--text); margin-bottom:18px; }
  input[type="text"] { width:100%; padding:14px 18px; border:2px solid #f3e8ff; border-radius:16px; font-family:'Quicksand',sans-serif; font-size:1rem; font-weight:600; outline:none; transition:border-color 0.2s; color:var(--text); background:var(--warm); }
  input[type="text"]:focus { border-color:var(--pink); }
  input[type="text"]::placeholder { color:#d1d5db; }
  .btn-primary { width:100%; padding:14px; background:linear-gradient(135deg,var(--pink),var(--lavender)); color:white; border:none; border-radius:16px; font-family:'Quicksand',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; margin-top:14px; transition:transform 0.2s,box-shadow 0.2s; box-shadow:0 4px 14px rgba(244,114,182,0.35); }
  .btn-primary:hover { transform:translateY(-2px); }
  .btn-primary:active { transform:scale(0.98); }

  #entry-screen { flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:24px; animation:fadeIn 0.5s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);} }

  #lobby-screen { flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:24px; animation:fadeIn 0.4s ease; }
  .lobby-card { background:white; border-radius:28px; padding:32px; width:100%; max-width:420px; box-shadow:var(--shadow); border:2px solid #fce7f3; }
  .lobby-header { display:flex; align-items:center; gap:10px; margin-bottom:28px; }
  .user-badge { margin-left:auto; background:var(--pink-light); color:var(--pink-dark); padding:6px 14px; border-radius:50px; font-size:0.82rem; font-weight:700; }
  .divider { text-align:center; color:var(--muted); font-size:0.82rem; font-weight:700; margin:18px 0; position:relative; }
  .divider::before,.divider::after { content:''; position:absolute; top:50%; width:38%; height:1px; background:#f3e8ff; }
  .divider::before{left:0;} .divider::after{right:0;}
  .btn-secondary { width:100%; padding:14px; background:var(--warm); color:var(--pink-dark); border:2px solid var(--pink-light); border-radius:16px; font-family:'Quicksand',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; transition:all 0.2s; }
  .btn-secondary:hover { background:var(--pink-light); border-color:var(--pink); }

  #chat-screen { flex-direction:column; height:100vh; width:100%; max-width:700px; margin:0 auto; background:white; box-shadow:var(--shadow); }
  .chat-header { background:white; border-bottom:2px solid #fce7f3; padding:12px 16px; display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:10; }
  .room-pill { background:var(--pink-light); color:var(--pink-dark); font-size:0.75rem; font-weight:700; padding:4px 12px; border-radius:50px; }
  #copy-btn { margin-left:auto; background:none; border:2px solid #f3e8ff; border-radius:50px; padding:5px 12px; font-family:'Quicksand',sans-serif; font-size:0.75rem; font-weight:700; color:var(--muted); cursor:pointer; transition:all 0.2s; }
  #copy-btn:hover { border-color:var(--pink); color:var(--pink-dark); }
  .leave-btn { background:none; border:none; font-size:1.2rem; cursor:pointer; padding:4px; color:var(--muted); }
  .leave-btn:hover { color:#ef4444; }

  #messages { flex:1; overflow-y:auto; padding:20px 16px; display:flex; flex-direction:column; gap:8px; background:var(--warm); }
  .date-divider { text-align:center; font-size:0.7rem; font-weight:700; color:var(--muted); letter-spacing:0.06em; text-transform:uppercase; margin:10px 0 2px; }
  .msg-wrap { display:flex; align-items:flex-end; gap:8px; animation:msgPop 0.25s cubic-bezier(0.175,0.885,0.32,1.275); }
  @keyframes msgPop { from{opacity:0;transform:scale(0.88);}to{opacity:1;transform:scale(1);} }
  .msg-wrap.mine { flex-direction:row-reverse; }
  .avatar { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.8rem; color:white; flex-shrink:0; }
  .msg-col { display:flex; flex-direction:column; max-width:72%; }
  .msg-sender { font-size:0.7rem; font-weight:700; color:var(--muted); margin-bottom:2px; padding-left:4px; }
  .bubble { padding:10px 14px; border-radius:18px; position:relative; word-break:break-word; }
  .bubble-mine { background:linear-gradient(135deg,var(--pink),var(--lavender)); color:white; border-bottom-right-radius:5px; box-shadow:0 3px 12px rgba(244,114,182,0.25); }
  .bubble-theirs { background:white; color:var(--text); border-bottom-left-radius:5px; border:2px solid #fce7f3; }
  .msg-text { font-size:0.92rem; line-height:1.55; display:block; }
  .msg-text a { color:inherit; text-decoration:underline; opacity:0.85; }
  .msg-image { max-width:220px; border-radius:12px; cursor:pointer; display:block; }
  .msg-time { font-size:0.62rem; margin-top:4px; text-align:right; opacity:0.6; }
  .bubble-mine .msg-time { color:#fce7f3; }
  .bubble-theirs .msg-time { color:var(--muted); }

  .video-preview { max-width:260px; border-radius:12px; overflow:hidden; background:#000; }
  .video-preview iframe { width:100%; height:148px; border:none; display:block; }
  .video-link-card { display:flex; align-items:center; gap:10px; background:#f9fafb; border:2px solid #f3e8ff; border-radius:14px; padding:10px 14px; max-width:260px; text-decoration:none; }
  .video-link-card:hover { background:#fce7f3; }

  .doc-card { display:flex; align-items:center; gap:10px; background:#f9fafb; border:2px solid #f3e8ff; border-radius:14px; padding:10px 14px; max-width:240px; text-decoration:none; cursor:pointer; }
  .doc-card:hover { background:#fce7f3; }
  .doc-icon { font-size:1.8rem; flex-shrink:0; }
  .doc-info { overflow:hidden; }
  .doc-name { font-size:0.78rem; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:160px; }
  .doc-size { font-size:0.68rem; color:var(--muted); }

  .react-trigger { display:none; position:absolute; top:-10px; right:-10px; background:white; border:1.5px solid #fce7f3; border-radius:50%; width:26px; height:26px; font-size:0.75rem; cursor:pointer; z-index:2; padding:0; }
  .bubble:hover .react-trigger { display:flex; align-items:center; justify-content:center; }
  .react-picker { position:absolute; top:-46px; right:0; background:white; border:2px solid #fce7f3; border-radius:50px; padding:6px 10px; display:flex; gap:4px; box-shadow:var(--shadow); z-index:10; }
  .react-picker.hidden { display:none; }
  .react-picker button { background:none; border:none; font-size:1.1rem; cursor:pointer; padding:2px; border-radius:50%; transition:transform 0.15s; }
  .react-picker button:hover { transform:scale(1.3); }
  .reactions { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
  .reaction-badge { background:white; border:2px solid #fce7f3; border-radius:50px; padding:2px 8px; font-size:0.75rem; }

  .chat-input-area { background:white; border-top:2px solid #fce7f3; padding:12px 16px; }
  .upload-indicator { display:flex; align-items:center; gap:8px; padding:8px 12px; background:var(--pink-light); border-radius:12px; font-size:0.82rem; font-weight:700; color:var(--pink-dark); margin-bottom:8px; }
  .upload-indicator.hidden { display:none; }
  .spinner { width:16px; height:16px; border:2px solid #fce7f3; border-top-color:var(--pink-dark); border-radius:50%; animation:spin 0.7s linear infinite; flex-shrink:0; }
  @keyframes spin { to{transform:rotate(360deg);} }
  .input-row { display:flex; align-items:flex-end; gap:8px; position:relative; }
  .input-actions { display:flex; gap:4px; flex-shrink:0; }
  .action-btn { width:38px; height:38px; border-radius:50%; border:2px solid #f3e8ff; background:var(--warm); font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; flex-shrink:0; }
  .action-btn:hover { border-color:var(--pink); background:var(--pink-light); }
  .action-btn:disabled { opacity:0.4; cursor:not-allowed; }
  textarea { flex:1; border:2px solid #f3e8ff; border-radius:20px; padding:10px 16px; font-family:'Quicksand',sans-serif; font-size:0.95rem; font-weight:600; resize:none; outline:none; max-height:120px; transition:border-color 0.2s; background:var(--warm); color:var(--text); line-height:1.5; }
  textarea:focus { border-color:var(--pink); }
  textarea::placeholder { color:#d1d5db; }
  #send-btn { width:40px; height:40px; border-radius:50%; border:none; background:linear-gradient(135deg,var(--pink),var(--lavender)); color:white; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 4px 12px rgba(244,114,182,0.4); transition:transform 0.2s; }
  #send-btn:hover { transform:scale(1.08); }
  #send-btn:active { transform:scale(0.95); }

  #emoji-picker { position:absolute; bottom:54px; left:0; background:white; border:2px solid #fce7f3; border-radius:18px; padding:10px; display:grid; grid-template-columns:repeat(8,1fr); gap:4px; box-shadow:var(--shadow); z-index:20; max-width:288px; }
  #emoji-picker.hidden { display:none; }
  #emoji-picker button { background:none; border:none; font-size:1.3rem; cursor:pointer; padding:4px; border-radius:8px; }
  #emoji-picker button:hover { background:var(--pink-light); }

  #img-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.88); display:flex; align-items:center; justify-content:center; z-index:100; cursor:pointer; }
  #img-overlay.hidden { display:none; }
  #img-overlay img { max-width:92vw; max-height:92vh; border-radius:14px; }

  /* video modal */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:50; align-items:center; justify-content:center; }
  .modal-overlay.show { display:flex; }
  .modal-box { background:white; border-radius:24px; padding:28px; width:90%; max-width:380px; box-shadow:0 8px 40px rgba(0,0,0,0.2); }
  .modal-box h3 { font-size:1rem; font-weight:700; margin-bottom:14px; color:var(--text); }
  .modal-btns { display:flex; gap:10px; margin-top:14px; }
  .modal-cancel { flex:1; padding:12px; background:#f9fafb; border:2px solid #f3e8ff; border-radius:14px; font-family:'Quicksand',sans-serif; font-weight:700; cursor:pointer; color:var(--muted); }
  .modal-confirm { flex:1; padding:12px; background:linear-gradient(135deg,var(--pink),var(--lavender)); color:white; border:none; border-radius:14px; font-family:'Quicksand',sans-serif; font-weight:700; cursor:pointer; }

  @keyframes shake { 0%,100%{transform:translateX(0);} 20%,60%{transform:translateX(-6px);} 40%,80%{transform:translateX(6px);} }
  .shake { animation:shake 0.4s ease; border-color:#ef4444 !important; }
  input[type="file"] { display:none; }
</style>
</head>
<body>

<!-- ENTRY -->
<div id="entry-screen" class="screen active">
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg viewBox="0 0 46 46" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M23 4C12.5 4 4 11.8 4 21.5c0 4.2 1.7 8 4.5 11L6 38l6.5-2c3 1.6 6.4 2.5 10.5 2.5C33.5 38.5 42 30.7 42 21c0-9.4-8.5-17-19-17z" fill="white" fill-opacity="0.9"/>
        <circle cx="16" cy="21" r="2.5" fill="#f472b6"/>
        <circle cx="23" cy="21" r="2.5" fill="#a78bfa"/>
        <circle cx="30" cy="21" r="2.5" fill="#34d399"/>
      </svg>
    </div>
    <div class="logo-text">Dchat</div>
  </div>
  <p class="tagline">🌸 cute little chats, just for us ✨</p>
  <div class="card">
    <h2>What's your name? 💕</h2>
    <input type="text" id="username-input" placeholder="Enter your name..." maxlength="20">
    <button class="btn-primary" id="continue-btn">Let's go! →</button>
  </div>
</div>

<!-- LOBBY -->
<div id="lobby-screen" class="screen">
  <div class="lobby-card">
    <div class="lobby-header">
      <div class="logo-icon-sm">
        <svg viewBox="0 0 46 46" fill="none"><path d="M23 4C12.5 4 4 11.8 4 21.5c0 4.2 1.7 8 4.5 11L6 38l6.5-2c3 1.6 6.4 2.5 10.5 2.5C33.5 38.5 42 30.7 42 21c0-9.4-8.5-17-19-17z" fill="white" fill-opacity="0.9"/><circle cx="16" cy="21" r="2.5" fill="#f472b6"/><circle cx="23" cy="21" r="2.5" fill="#a78bfa"/><circle cx="30" cy="21" r="2.5" fill="#34d399"/></svg>
      </div>
      <div class="logo-text-sm">Dchat</div>
      <div class="user-badge" id="lobby-username"></div>
    </div>
    <h2 style="font-size:1rem;color:var(--muted);margin-bottom:16px">Start a new room ✨</h2>
    <button class="btn-primary" id="create-room-btn">🌸 Create Room</button>
    <div class="divider">or join existing</div>
    <input type="text" id="room-input" placeholder="Enter room code..." maxlength="6" style="text-transform:uppercase">
    <button class="btn-secondary" id="join-room-btn" style="margin-top:12px">Join Room →</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat-screen" class="screen">
  <div class="chat-header">
    <div class="logo-icon-sm">
      <svg viewBox="0 0 46 46" fill="none"><path d="M23 4C12.5 4 4 11.8 4 21.5c0 4.2 1.7 8 4.5 11L6 38l6.5-2c3 1.6 6.4 2.5 10.5 2.5C33.5 38.5 42 30.7 42 21c0-9.4-8.5-17-19-17z" fill="white" fill-opacity="0.9"/><circle cx="16" cy="21" r="2.5" fill="#f472b6"/><circle cx="23" cy="21" r="2.5" fill="#a78bfa"/><circle cx="30" cy="21" r="2.5" fill="#34d399"/></svg>
    </div>
    <div class="logo-text-sm">Dchat</div>
    <div class="room-pill">🔑 <span id="room-code-display"></span></div>
    <button id="copy-btn">🔗 Copy</button>
    <button class="leave-btn" id="leave-btn">✕</button>
  </div>
  <div id="messages"></div>
  <div class="chat-input-area">
    <div class="upload-indicator hidden" id="upload-indicator">
      <div class="spinner"></div> <span id="upload-text">Uploading...</span>
    </div>
    <div class="input-row">
      <div class="input-actions">
        <button class="action-btn" id="emoji-btn" title="Emoji">😊</button>
        <button class="action-btn" id="image-btn" title="Image">🖼️</button>
        <button class="action-btn" id="doc-btn" title="Document">📎</button>
        <button class="action-btn" id="video-btn" title="Video link">🎬</button>
      </div>
      <textarea id="msg-input" placeholder="Message... 💕" rows="1"></textarea>
      <button id="send-btn">➤</button>
      <div id="emoji-picker" class="hidden">
        <button>😀</button><button>😂</button><button>😍</button><button>🥰</button>
        <button>😎</button><button>🤩</button><button>😭</button><button>😤</button>
        <button>🙈</button><button>🔥</button><button>❤️</button><button>💕</button>
        <button>✨</button><button>🌸</button><button>🦋</button><button>🍃</button>
        <button>🎉</button><button>👏</button><button>💪</button><button>🙌</button>
        <button>🌊</button><button>⭐</button><button>🎀</button><button>🌈</button>
      </div>
    </div>
  </div>
</div>

<!-- VIDEO MODAL -->
<div class="modal-overlay" id="video-modal">
  <div class="modal-box">
    <h3>🎬 Share a video link</h3>
    <input type="text" id="video-url-input" placeholder="Paste YouTube or any video URL...">
    <div class="modal-btns">
      <button class="modal-cancel" id="video-cancel-btn">Cancel</button>
      <button class="modal-confirm" id="video-send-btn">Send 🎬</button>
    </div>
  </div>
</div>

<input type="file" id="image-upload" accept="image/*">
<input type="file" id="doc-upload" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip">
<div id="img-overlay" class="hidden"><img id="overlay-img" src="" alt="full image"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://vobdxzztrwhddhmcvtnm.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvYmR4enp0cndoZGRobWN2dG5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NTYwOTMsImV4cCI6MjA5NTUzMjA5M30.B-TVOqTlxm3_khNmhGy3fJDW6_prUsDnSioQm5Q4ipo';
  const IMGBB_KEY = 'ace127724878c883fe66267081e45f1a';

  let currentUser = '', currentRoom = '', subscription = null;
  const EMOJIS = ['❤️','😂','😮','😢','🔥','👏','🌸','✨'];

  const MAX_DOC_SIZE = 1 * 1024 * 1024; // 1MB limit for base64 in Supabase

  function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
  function generateRoomCode() { return Math.random().toString(36).substring(2,8).toUpperCase(); }
  function avatarColor(name) {
    const colors=['#f472b6','#a78bfa','#34d399','#fb923c','#38bdf8','#f59e0b','#ec4899','#6366f1'];
    let h=0; for(let c of name) h=c.charCodeAt(0)+((h<<5)-h); return colors[Math.abs(h)%colors.length];
  }
  function formatTime(ts) { if(!ts)return''; return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
  function formatDate(ts) {
    const d=new Date(ts),today=new Date(),yest=new Date(today); yest.setDate(today.getDate()-1);
    if(d.toDateString()===today.toDateString()) return'Today';
    if(d.toDateString()===yest.toDateString()) return'Yesterday';
    return d.toLocaleDateString([],{weekday:'long',month:'short',day:'numeric'});
  }
  function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function shake(id) { const e=document.getElementById(id); e.classList.add('shake'); setTimeout(()=>e.classList.remove('shake'),500); }
  function getYouTubeId(url) { const m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/); return m?m[1]:null; }
  function getDocIcon(name) { const ext=(name.split('.').pop()||'').toLowerCase(); return{pdf:'📄',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',ppt:'📊',pptx:'📊',txt:'📃',zip:'🗜️'}[ext]||'📎'; }
  function linkify(text) { return escapeHtml(text).replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>'); }
  function toBase64(file) { return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); }); }
  function showUpload(show, text='Uploading...') {
    document.getElementById('upload-indicator').classList.toggle('hidden',!show);
    document.getElementById('upload-text').textContent=text;
    ['image-btn','doc-btn'].forEach(id=>document.getElementById(id).disabled=show);
  }

  // ── ENTRY ──
  document.getElementById('continue-btn').addEventListener('click', goToLobby);
  document.getElementById('username-input').addEventListener('keydown', e=>{ if(e.key==='Enter') goToLobby(); });
  function goToLobby() {
    const name=document.getElementById('username-input').value.trim();
    if(!name) return shake('username-input');
    currentUser=name;
    document.getElementById('lobby-username').textContent='Hi, '+name+'! 🌸';
    showScreen('lobby-screen');
  }

  // ── LOBBY ──
  document.getElementById('create-room-btn').addEventListener('click',()=>{ const code=generateRoomCode(); document.getElementById('room-input').value=code; joinRoom(code); });
  document.getElementById('join-room-btn').addEventListener('click',()=>{ const code=document.getElementById('room-input').value.trim().toUpperCase(); if(!code) return shake('room-input'); joinRoom(code); });
  document.getElementById('room-input').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('join-room-btn').click(); });

  async function joinRoom(code) {
    currentRoom=code;
    document.getElementById('room-code-display').textContent=code;
    showScreen('chat-screen');
    await loadMessages();
    subscribeToMessages();
  }

  // ── MESSAGES ──
  async function loadMessages() {
    const{data}=await sb.from('messages').select('*').eq('room',currentRoom).order('created_at',{ascending:true});
    const chat=document.getElementById('messages'); chat.innerHTML=''; let lastDate='';
    (data||[]).forEach(msg=>{ const dl=formatDate(msg.created_at); if(dl!==lastDate){const d=document.createElement('div');d.className='date-divider';d.textContent=dl;chat.appendChild(d);lastDate=dl;} chat.appendChild(renderMessage(msg)); });
    chat.scrollTop=chat.scrollHeight;
  }

  function subscribeToMessages() {
    if(subscription) sb.removeChannel(subscription);
    subscription=sb.channel('room-'+currentRoom)
      .on('postgres_changes',{event:'*',schema:'public',table:'messages',filter:'room=eq.'+currentRoom},payload=>{
        const chat=document.getElementById('messages');
        if(payload.eventType==='INSERT'){chat.appendChild(renderMessage(payload.new));chat.scrollTop=chat.scrollHeight;}
        else if(payload.eventType==='UPDATE'){const el=document.querySelector('[data-id="'+payload.new.id+'"]');if(el)el.replaceWith(renderMessage(payload.new));}
      }).subscribe();
  }

  function renderMessage(msg) {
    const isMine=msg.sender===currentUser;
    const wrap=document.createElement('div');
    wrap.className='msg-wrap '+(isMine?'mine':'theirs'); wrap.dataset.id=msg.id;
    const av=`<div class="avatar" style="background:${avatarColor(msg.sender)}">${msg.sender.charAt(0).toUpperCase()}</div>`;

    let content='';
    if(msg.type==='image') {
      content=`<img src="${msg.content}" class="msg-image" data-url="${msg.content}" alt="image">`;
    } else if(msg.type==='video') {
      const ytId=getYouTubeId(msg.content);
      content=ytId
        ?`<div class="video-preview"><iframe src="https://www.youtube.com/embed/${ytId}" allowfullscreen></iframe></div>`
        :`<a class="video-link-card" href="${msg.content}" target="_blank" rel="noopener"><span style="font-size:1.8rem">🎬</span><div><div style="font-size:0.78rem;font-weight:700;color:var(--text)">Video Link</div><div style="font-size:0.68rem;color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(msg.content)}</div></div></a>`;
    } else if(msg.type==='document') {
      let meta; try{meta=JSON.parse(msg.content);}catch{meta={name:'Document',size:'',dataUrl:msg.content};}
      content=`<a class="doc-card" href="${meta.dataUrl}" download="${escapeHtml(meta.name)}">
        <div class="doc-icon">${getDocIcon(meta.name)}</div>
        <div class="doc-info"><div class="doc-name">${escapeHtml(meta.name)}</div><div class="doc-size">${meta.size}</div></div>
      </a>`;
    } else {
      content=`<span class="msg-text">${linkify(msg.content)}</span>`;
    }

    const reactions=msg.reactions||{};
    const counts={};
    Object.values(reactions).forEach(e=>counts[e]=(counts[e]||0)+1);
    const reactionsHtml=Object.keys(counts).length?`<div class="reactions">${Object.entries(counts).map(([e,c])=>`<span class="reaction-badge">${e} ${c}</span>`).join('')}</div>`:'';

    wrap.innerHTML=`
      ${!isMine?av:''}
      <div class="msg-col">
        ${!isMine?`<div class="msg-sender">${escapeHtml(msg.sender)}</div>`:''}
        <div class="bubble ${isMine?'bubble-mine':'bubble-theirs'}">
          ${content}
          <div class="msg-time">${formatTime(msg.created_at)}</div>
          <button class="react-trigger">😊</button>
          <div class="react-picker hidden">${EMOJIS.map(e=>`<button data-emoji="${e}">${e}</button>`).join('')}</div>
        </div>
        ${reactionsHtml}
      </div>
      ${isMine?av:''}
    `;

    const trigger=wrap.querySelector('.react-trigger'), picker=wrap.querySelector('.react-picker');
    trigger.addEventListener('click',e=>{e.stopPropagation();picker.classList.toggle('hidden');});
    picker.querySelectorAll('button').forEach(btn=>{
      btn.addEventListener('click',async()=>{
        const nr={...reactions,[currentUser]:btn.dataset.emoji};
        await sb.from('messages').update({reactions:nr}).eq('id',msg.id);
        picker.classList.add('hidden');
      });
    });
    const imgEl=wrap.querySelector('.msg-image');
    if(imgEl) imgEl.addEventListener('click',()=>{ document.getElementById('overlay-img').src=imgEl.dataset.url; document.getElementById('img-overlay').classList.remove('hidden'); });
    return wrap;
  }

  document.addEventListener('click',()=>document.querySelectorAll('.react-picker').forEach(p=>p.classList.add('hidden')));

  // ── SEND TEXT ──
  document.getElementById('send-btn').addEventListener('click',sendMessage);
  document.getElementById('msg-input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
  document.getElementById('msg-input').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';});
  async function sendMessage() {
    const input=document.getElementById('msg-input'), text=input.value.trim();
    if(!text) return; input.value=''; input.style.height='auto';
    await sb.from('messages').insert({room:currentRoom,sender:currentUser,content:text,type:'text',reactions:{}});
  }

  // ── IMAGE via ImgBB ──
  document.getElementById('image-btn').addEventListener('click',()=>document.getElementById('image-upload').click());
  document.getElementById('image-upload').addEventListener('change',async e=>{
    const file=e.target.files[0]; if(!file) return;
    showUpload(true,'Uploading image...');
    try {
      const base64=await toBase64(file).then(r=>r.split(',')[1]);
      const form=new FormData(); form.append('image',base64);
      const res=await fetch('https://api.imgbb.com/1/upload?key='+IMGBB_KEY,{method:'POST',body:form});
      const data=await res.json();
      if(data.success) await sb.from('messages').insert({room:currentRoom,sender:currentUser,content:data.data.url,type:'image',reactions:{}});
      else alert('Image upload failed.');
    } catch(err){alert('Error: '+err.message);}
    finally{showUpload(false);e.target.value='';}
  });

  // ── DOCUMENT via base64 in Supabase ──
  document.getElementById('doc-btn').addEventListener('click',()=>document.getElementById('doc-upload').click());
  document.getElementById('doc-upload').addEventListener('change',async e=>{
    const file=e.target.files[0]; if(!file) return;
    if(file.size > MAX_DOC_SIZE){ alert('File too large! Please keep documents under 1MB.'); e.target.value=''; return; }
    showUpload(true,'Uploading document...');
    try {
      const dataUrl=await toBase64(file);
      const size=file.size<1024*1024?(file.size/1024).toFixed(1)+' KB':(file.size/1024/1024).toFixed(1)+' MB';
      const meta=JSON.stringify({dataUrl,name:file.name,size});
      await sb.from('messages').insert({room:currentRoom,sender:currentUser,content:meta,type:'document',reactions:{}});
    } catch(err){alert('Error: '+err.message);}
    finally{showUpload(false);e.target.value='';}
  });

  // ── VIDEO LINK ──
  document.getElementById('video-btn').addEventListener('click',()=>{ document.getElementById('video-modal').classList.add('show'); document.getElementById('video-url-input').value=''; setTimeout(()=>document.getElementById('video-url-input').focus(),100); });
  document.getElementById('video-cancel-btn').addEventListener('click',()=>document.getElementById('video-modal').classList.remove('show'));
  document.getElementById('video-send-btn').addEventListener('click',async()=>{
    const url=document.getElementById('video-url-input').value.trim(); if(!url) return;
    document.getElementById('video-modal').classList.remove('show');
    await sb.from('messages').insert({room:currentRoom,sender:currentUser,content:url,type:'video',reactions:{}});
  });
  document.getElementById('video-url-input').addEventListener('keydown',e=>{if(e.key==='Enter') document.getElementById('video-send-btn').click();});

  // ── EMOJI ──
  document.getElementById('emoji-btn').addEventListener('click',e=>{e.stopPropagation();document.getElementById('emoji-picker').classList.toggle('hidden');});
  document.getElementById('emoji-picker').querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click',()=>{ document.getElementById('msg-input').value+=btn.textContent; document.getElementById('msg-input').focus(); document.getElementById('emoji-picker').classList.add('hidden'); });
  });

  // ── HEADER ──
  document.getElementById('copy-btn').addEventListener('click',()=>{ navigator.clipboard.writeText(currentRoom); const btn=document.getElementById('copy-btn'); btn.textContent='✅ Copied!'; setTimeout(()=>btn.textContent='🔗 Copy',1500); });
  document.getElementById('leave-btn').addEventListener('click',()=>{ if(subscription) sb.removeChannel(subscription); currentRoom=''; showScreen('lobby-screen'); });
  document.getElementById('img-overlay').addEventListener('click',()=>document.getElementById('img-overlay').classList.add('hidden'));
</script>
</body>
</html>
